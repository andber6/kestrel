[project]
name = "kestrel-sdk"
version = "0.1.0"
description = "Python SDK for Kestrel — route LLM requests to the cheapest capable model"
requires-python = ">=3.9"
license = "MIT"
readme = "README.md"
dependencies = [
    "openai>=1.0",
]

[project.urls]
Homepage = "https://github.com/andber6/kestrel"
Documentation = "https://github.com/andber6/kestrel/tree/main/docs"
Repository = "https://github.com/andber6/kestrel"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kestrel_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
