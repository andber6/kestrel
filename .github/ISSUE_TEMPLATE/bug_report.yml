name: Bug Report
description: Report a bug in Kestrel
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure Kestrel with...
        2. Send a request to...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Local (uv run)
        - Managed service (api.usekestrel.io)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kestrel version
      placeholder: "e.g. 0.2.0 or commit hash"
  - type: dropdown
    id: provider
    attributes:
      label: Provider(s) involved
      multiple: true
      options:
        - OpenAI
        - Anthropic
        - Google Gemini
        - Groq
        - xAI
        - Mistral
        - Cohere
        - Together AI
        - N/A
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs.
      render: shell
