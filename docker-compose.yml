services:
  proxy:
    build:
      context: ./packages/core
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentrouter
      POSTGRES_USER: agentrouter
      POSTGRES_PASSWORD: agentrouter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentrouter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
